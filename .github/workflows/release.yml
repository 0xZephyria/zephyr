name: Release Zephyr Compiler
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-musl
            suffix: linux-amd64
          - os: ubuntu-latest
            target: aarch64-linux-musl
            suffix: linux-arm64
          - os: macos-latest
            target: x86_64-macos
            suffix: macos-amd64
          - os: macos-latest
            target: aarch64-macos
            suffix: macos-arm64
          - os: windows-latest
            target: x86_64-windows
            suffix: windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0 # Or whichever version matches 

      - name: Build Binary
        run: zig build-exe src/main.zig -target ${{ matrix.target }} -O ReleaseSafe -femit-bin=zeph-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeph-${{ matrix.suffix }}
          path: zeph-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zeph-linux-amd64/zeph-linux-amd64
            zeph-linux-arm64/zeph-linux-arm64
            zeph-macos-amd64/zeph-macos-amd64
            zeph-macos-arm64/zeph-macos-arm64
            zeph-windows-amd64.exe/zeph-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
